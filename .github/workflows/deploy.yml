name: Auto Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production  # Require manual approval

    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "ERROR: EC2_HOST secret is not configured"
            echo "Please add the following secrets in GitHub repository settings:"
            echo "  - EC2_HOST: your-ec2-public-ip or domain"
            echo "  - EC2_SSH_KEY: your-private-ssh-key"
            exit 1
          fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "ERROR: EC2_SSH_KEY secret is not configured"
            exit 1
          fi

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 120s
          script_stop: true
          script: |
            #!/bin/bash
            set -e
            
            echo "======================================"
            echo "Starting Quiz Bolt Deployment"
            echo "======================================"
            
            # Configuration
            PROJECT_DIR="/home/ubuntu/quiz-bolt"
            BACKUP_DIR="/home/ubuntu/quiz-bolt-backup-$(date +%s)"
            
            # Step 1: Verify project directory exists
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "ERROR: Project directory not found at $PROJECT_DIR"
              echo "Please clone the repository first:"
              echo "  git clone https://github.com/tarunbommali/quiz-bolt.git ~/quiz-bolt"
              exit 1
            fi
            
            echo "✓ Project directory verified"
            
            # Step 2: Create backup (for rollback capability)
            echo "Creating backup at $BACKUP_DIR..."
            cp -r "$PROJECT_DIR" "$BACKUP_DIR" || {
              echo "WARNING: Could not create full backup, continuing anyway..."
            }
            
            # Step 3: Pull latest code
            echo "Pulling latest code..."
            cd "$PROJECT_DIR"
            git fetch origin main
            git reset --hard origin/main
            
            # Step 4: Deploy Server Service
            echo ""
            echo "======================================"
            echo "Deploying Server Service"
            echo "======================================"
            cd "$PROJECT_DIR/server"
            
            if [ ! -f package.json ]; then
              echo "ERROR: Server package.json not found"
              exit 1
            fi
            
            npm ci --production
            
            # Verify server starts
            if pm2 describe server > /dev/null 2>&1; then
              pm2 restart server --wait-ready --listen-timeout 10000
            else
              pm2 start ecosystem.config.js --name server --wait-ready --listen-timeout 10000
            fi
            
            sleep 2
            if ! pm2 describe server | grep -q "online"; then
              echo "ERROR: Server failed to start"
              pm2 logs server --lines 50
              exit 1
            fi
            echo "✓ Server deployed successfully"
            
            # Step 5: Deploy Payment Service
            echo ""
            echo "======================================"
            echo "Deploying Payment Service"
            echo "======================================"
            cd "$PROJECT_DIR/payment-service"
            
            if [ ! -f package.json ]; then
              echo "ERROR: Payment Service package.json not found"
              exit 1
            fi
            
            npm ci --production
            
            if pm2 describe payment > /dev/null 2>&1; then
              pm2 restart payment --wait-ready --listen-timeout 10000
            else
              pm2 start server.js --name payment --wait-ready --listen-timeout 10000
            fi
            
            sleep 2
            if ! pm2 describe payment | grep -q "online"; then
              echo "ERROR: Payment Service failed to start"
              pm2 logs payment --lines 50
              exit 1
            fi
            echo "✓ Payment Service deployed successfully"
            
            # Step 6: Build and Deploy Client
            echo ""
            echo "======================================"
            echo "Building and Deploying Client"
            echo "======================================"
            cd "$PROJECT_DIR/client"
            
            if [ ! -f package.json ]; then
              echo "ERROR: Client package.json not found"
              exit 1
            fi
            
            npm ci --production
            npm run build
            
            if [ ! -d dist ]; then
              echo "ERROR: Client build failed - dist directory not found"
              exit 1
            fi
            
            # Copy built files to nginx directory
            NGINX_DIR="/var/www/quiz-bolt"
            sudo mkdir -p "$NGINX_DIR"
            sudo rsync -av --delete dist/ "$NGINX_DIR/"
            
            echo "✓ Client built and deployed successfully"
            
            # Step 7: Validate and Restart Nginx
            echo ""
            echo "======================================"
            echo "Validating and Restarting Nginx"
            echo "======================================"
            
            sudo nginx -t || {
              echo "ERROR: Nginx configuration test failed"
              exit 1
            }
            
            sudo systemctl restart nginx || {
              echo "ERROR: Nginx restart failed"
              exit 1
            }
            
            sleep 2
            sudo systemctl is-active --quiet nginx || {
              echo "ERROR: Nginx is not running"
              sudo systemctl status nginx
              exit 1
            }
            
            echo "✓ Nginx restarted successfully"
            
            # Step 8: Health Check
            echo ""
            echo "======================================"
            echo "Health Checks"
            echo "======================================"
            
            pm2 save
            pm2 status
            
            echo ""
            echo "Checking service endpoints..."
            echo "Server: $(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/health || echo 'timeout')"
            echo "Payment: $(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/health || echo 'timeout')"
            
            echo ""
            echo "======================================"
            echo "✅ Deployment Completed Successfully!"
            echo "======================================"
            echo "Backup location: $BACKUP_DIR"
            echo "To rollback: cp -r $BACKUP_DIR/* $PROJECT_DIR/"

      - name: Deployment Failed Notification
        if: failure()
        run: |
          echo "❌ Deployment failed! Check logs above for details."
          echo "Common issues:"
          echo "1. SSH key or host not configured properly"
          echo "2. Node.js or npm not installed on EC2"
          echo "3. PM2 not installed globally on EC2"
          echo "4. Insufficient disk space"
          echo "5. Port conflicts (3000, 3001, 80, 443)"
