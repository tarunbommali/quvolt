services:
  # MongoDB database
  mongodb:
    image: mongo:7
    container_name: quiz-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:?MONGO_ROOT_USER is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: quiz_platform
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - quiz-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache and session store
  redis:
    image: redis:7-alpine
    container_name: quiz-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - quiz-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API service
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: quiz-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: ${SERVER_PORT:-5000}
      MONGO_URI: ${MONGO_URI:?MONGO_URI is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      REDIS_URL: redis://redis:6379
      PAYMENT_SERVICE_URL: http://payment-service:5001
      CLIENT_URL: ${CLIENT_URL:-http://localhost:80,http://localhost:5173}
      NODE_ENV: ${NODE_ENV:-production}
      PAYMENT_PROXY_TIMEOUT_MS: ${PAYMENT_PROXY_TIMEOUT_MS:-8000}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - quiz-network

  # Payment microservice
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: quiz-payment
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: ${PAYMENT_SERVICE_PORT:-5001}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      PAYMENTS_ENABLED: ${PAYMENTS_ENABLED:-true}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-your_webhook_secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:80,http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/payment/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - quiz-network

  # Frontend client (Nginx + React)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: quiz-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    networks:
      - quiz-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

networks:
  quiz-network:
    driver: bridge
